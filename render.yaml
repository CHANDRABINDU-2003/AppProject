# Render Blueprint — deploys ONLY the AgriPulse backend (free web service).
# The database is Neon (free, permanent Postgres) — set DATABASE_URL in the
# Render dashboard, NOT here, so it stays secret.
#
# How to use:
#   1. Push this file to GitHub (repo root).
#   2. render.com → New → Blueprint → pick the AppProject repo → Apply.
#   3. When prompted, paste your Neon connection string as DATABASE_URL.
#
# The service URL Render gives you (e.g. https://agripulse-backend.onrender.com)
# is what goes into frontend/lib/config.dart.

services:
  - type: web
    name: agripulse-backend
    runtime: python
    plan: free            # free web service (spins down when idle → ~50s cold start)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Seed runs every deploy but is idempotent (skips rows that already exist),
    # so the demo accounts (farmer1@agripulse.com, etc.) exist on first boot.
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pinned: psycopg2-binary 2.9.9 / bcrypt 4.0.1 only ship wheels up to 3.11.
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Neon Postgres connection string — paste it in the Render dashboard.
      # Format: postgresql://user:pass@ep-xxx.REGION.aws.neon.tech/DB?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong random secret
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # The ML/assistant service isn't hosted here — leave as-is; login & core work.
      - key: AI_SERVICE_URL
        value: "http://localhost:8001"
      - key: WEATHER_API_KEY
        value: ""
      - key: OPENAI_API_KEY
        value: ""
