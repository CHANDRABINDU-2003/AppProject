# Alembic configuration for the AgriPulse database.
#
# Run migrations from this folder (database/migrations/):
#     alembic upgrade head            # apply all migrations
#     alembic revision --autogenerate -m "describe change"
#     alembic downgrade -1            # roll back one step
#
# The database URL is NOT hard-coded here — env.py reads it from the
# DATABASE_URL environment variable, falling back to the backend's settings,
# so there is one source of truth shared with the FastAPI app.

[alembic]
script_location = .
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
