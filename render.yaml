# Render Blueprint — deploys the AgriPulse backend + PostgreSQL.
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this file to GitHub (it must live in the repo root).
#   2. On render.com → New → Blueprint → pick the AppProject repo.
#   3. Render reads this file and creates the database + web service.
#
# The web service URL it gives you (e.g. https://agripulse-backend.onrender.com)
# is what goes into frontend/lib/config.dart.

databases:
  - name: agripulse-db
    databaseName: agripulse
    user: agripulse
    plan: free            # free Postgres (note: expires ~30 days on free tier)

services:
  - type: web
    name: agripulse-backend
    runtime: python
    plan: free            # free web service (spins down when idle → ~50s cold start)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Seed runs every deploy but is idempotent (skips rows that already exist),
    # so the demo accounts (farmer1@agripulse.com, etc.) exist on first boot.
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Pinned: psycopg2-binary 2.9.9 / bcrypt 4.0.1 only ship wheels up to 3.11.
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: agripulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong random secret
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # The ML/assistant service isn't hosted here — leave as-is; login & core work.
      - key: AI_SERVICE_URL
        value: "http://localhost:8001"
      - key: WEATHER_API_KEY
        value: ""
      - key: OPENAI_API_KEY
        value: ""
